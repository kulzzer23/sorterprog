name: Build and Release EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# Критически важная настройка: даем боту права на создание релизов
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "ImageTagger" main.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # Указываем путь к нашему собранному exe-файлу
        files: dist/ImageTagger.exe
        # Генерируем уникальное название и тег на основе номера запуска
        tag_name: "v1.0.${{ github.run_number }}"
        name: "ImageTagger Build #${{ github.run_number }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}